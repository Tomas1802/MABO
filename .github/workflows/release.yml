name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package release
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Resolve tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: MABO ${{ steps.release_tag.outputs.tag }}
          files: |
            build/release/mabo-windows.zip
            build/release/install-windows.ps1
            build/release/uninstall-windows.ps1
            build/release/mabo-language-0.1.0.vsix
